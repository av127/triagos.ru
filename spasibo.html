<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Заявка отправлена — триагос</title>
<link rel="icon" type="image/svg+xml" href="triagos-favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#141E23; --machine:#1E2A30; --accent:#4FA0A0; --accent-d:#3E8C8C; --human:#BC6247; --text:#E4EDEC; --muted:#93A8A8; --line:rgba(79,160,160,.16); }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:var(--ink); color:var(--text); line-height:1.6;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; min-height:100svh;
  }
  header.nav{border-bottom:1px solid var(--line)}
  .nav-in{max-width:900px; margin:0 auto; padding:0 24px; height:64px; display:flex; align-items:center; gap:9px}
  .logo{display:flex; align-items:center; gap:9px; font-family:"Space Grotesk",system-ui,sans-serif; font-weight:700; font-size:20px; letter-spacing:-.02em; color:#fff; text-decoration:none}
  .logo svg{width:20px; height:24px; display:block}

  main{flex:1; display:grid; place-items:center; padding:48px 24px}
  .card{max-width:520px; text-align:center}
  .check{width:76px; height:76px; margin:0 auto 26px; border-radius:50%;
    background:color-mix(in srgb, var(--accent) 15%, transparent);
    display:grid; place-items:center; border:1.5px solid color-mix(in srgb, var(--accent) 45%, transparent)}
  .check svg{width:38px; height:38px; fill:none; stroke:var(--accent); stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round}
  .eyebrow{font-family:"JetBrains Mono","Space Grotesk",monospace; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin-bottom:14px}
  h1{font-family:"Space Grotesk",system-ui,sans-serif; font-size:clamp(28px,5vw,38px); font-weight:700; letter-spacing:-.02em; color:#fff; line-height:1.1}
  p{color:var(--muted); font-size:17px; margin-top:16px; max-width:44ch; margin-left:auto; margin-right:auto}
  .actions{margin-top:32px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap}
  .btn{display:inline-flex; align-items:center; gap:8px; font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:15px; padding:12px 22px; border-radius:10px; border:1.5px solid transparent; transition:.18s; text-decoration:none}
  .btn-primary{background:var(--accent); color:#0b1a1a}
  .btn-primary:hover{background:var(--accent-d)}
  .btn-ghost{border-color:var(--line); color:var(--muted)}
  .btn-ghost:hover{border-color:var(--accent); color:#fff}
  .btn svg{width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}

  footer{border-top:1px solid var(--line); color:var(--muted); font-size:13.5px; text-align:center; padding:20px 24px}
  footer a{color:var(--accent); text-decoration:none}
</style>
</head>
<body>
<header class="nav">
  <div class="nav-in">
    <a class="logo" href="/">
      <svg viewBox="0 0 32 32" fill="currentColor" aria-hidden="true"><rect x="13" y="3" width="6" height="2" rx="1" opacity=".55"/><rect x="10" y="8" width="12" height="5" rx="1.5" fill="#BC6247"/><rect x="7" y="15" width="18" height="5" rx="1.5" opacity=".65"/><rect x="4" y="22" width="24" height="6" rx="1.5"/></svg>триагос
    </a>
  </div>
</header>

<main>
  <div class="card">
    <div class="check"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg></div>
    <p class="eyebrow">Заявка принята</p>
    <h1>Спасибо! Мы получили ваше обращение</h1>
    <p>Посмотрим ваши процессы и ответим на указанный контакт в течение рабочего дня. Без обязательств.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">На главную <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
      <a class="btn btn-ghost" href="/#how">Как это работает</a>
    </div>
  </div>
</main>

<footer>
  триагос · вопросы — <a href="mailto:info@triagos.ru">info@triagos.ru</a>
</footer>
</body>
</html>
