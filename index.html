<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>triagos</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #0d1117;
      --ink: #e6e9ee;
      --muted: #8b95a3;
      --accent: #e03131;
      --blue: #2f5fd0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    main { text-align: center; padding: 2rem; }
    h1 {
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    h1 .dot { color: var(--accent); }
    p {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 1.05rem;
    }
    .bar {
      margin: 1.6rem auto 0;
      width: 64px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--blue), var(--accent));
    }
  </style>
</head>
<body>
  <main>
    <h1>triagos<span class="dot">.</span></h1>
    <div class="bar"></div>
    <p>Сайт скоро откроется.</p>
  </main>
</body>
</html>
